name: Hourly VCP breakout scan

on:
  schedule:
    # Runs at :45 past the hour, UTC hours 4-9 = IST 10:15, 11:15, 12:15,
    # 13:15, 14:15, 15:15 -- one check per hour through most of the session.
    - cron: "45 4-9 * * 1-5"
  workflow_dispatch: {}

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python hourly_scan.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update alerted_today.json"
          file_pattern: alerted_today.json
