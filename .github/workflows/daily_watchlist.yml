name: Build VCP watchlist

on:
  schedule:
    - cron: "30 3 * * 1-5"   # 09:00 IST, Mon-Fri -- before market open
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python build_watchlist.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update watchlist.json"
          file_pattern: watchlist.json
